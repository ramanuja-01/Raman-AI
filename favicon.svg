<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Pink glow -->
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing Outer Tech Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00f3ff" stroke-width="6" stroke-dasharray="120 40 220 40 90 40" opacity="0.9" filter="url(#glow-cyan)" />
  
  <!-- Secondary Inner Tech Ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#ff00a0" stroke-width="4" stroke-dasharray="15 20 40 20" opacity="0.8" filter="url(#glow-pink)" />
  
  <!-- Outer Dotted Orbit -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#00f3ff" stroke-width="3" stroke-dasharray="3 15" opacity="0.5" />

  <!-- Hexagonal frame -->
  <polygon points="256,86 403,171 403,341 256,426 109,341 109,171" fill="none" stroke="#00f3ff" stroke-width="4" stroke-opacity="0.6" filter="url(#glow-cyan)" />

  <!-- Medical Cross styling -->
  <!-- Vertical Bar -->
  <rect x="230" y="146" width="52" height="220" rx="8" fill="#00f3ff" filter="url(#glow-cyan)" />
  <!-- Horizontal Bar -->
  <rect x="146" y="230" width="220" height="52" rx="8" fill="#00f3ff" filter="url(#glow-cyan)" />
  
  <!-- White/Neon glow core accents inside the cross -->
  <rect x="244" y="160" width="24" height="192" rx="4" fill="#ffffff" opacity="0.95" />
  <rect x="160" y="244" width="192" height="24" rx="4" fill="#ffffff" opacity="0.95" />
  
  <!-- Corner tech brackets -->
  <path d="M 130 120 L 90 120 L 90 160" fill="none" stroke="#ff00a0" stroke-width="6" stroke-linecap="round" filter="url(#glow-pink)" />
  <path d="M 382 120 L 422 120 L 422 160" fill="none" stroke="#ff00a0" stroke-width="6" stroke-linecap="round" filter="url(#glow-pink)" />
  <path d="M 90 352 L 90 392 L 130 392" fill="none" stroke="#ff00a0" stroke-width="6" stroke-linecap="round" filter="url(#glow-pink)" />
  <path d="M 422 352 L 422 392 L 382 392" fill="none" stroke="#ff00a0" stroke-width="6" stroke-linecap="round" filter="url(#glow-pink)" />

  <!-- Outer Orbiting Nodes -->
  <circle cx="109" cy="171" r="9" fill="#ff00a0" filter="url(#glow-pink)" />
  <circle cx="403" cy="341" r="9" fill="#ff00a0" filter="url(#glow-pink)" />
  <circle cx="256" cy="86" r="11" fill="#00f3ff" filter="url(#glow-cyan)" />
  <circle cx="256" cy="426" r="11" fill="#00f3ff" filter="url(#glow-cyan)" />
</svg>
